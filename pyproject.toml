[tool.poetry]
name = 'lexicon'
version = '0.1.0'
description = 'Command line and lib toolset for word definitions, spell check, and spelling suggestions'
authors = ['roboto84 <7658704+roboto84@users.noreply.github.com>']

[tool.poetry.dependencies]
python = '^3.8'
python-dotenv = '^0.15.0'
pyenchant = '^3.2.0'
lexicon-collect = {git = 'https://github.com/roboto84/lexicon_collect.git', rev = 'develop'}

[tool.poetry.dev-dependencies]
pytest = '^5.2'

[build-system]
requires = ['poetry-core>=1.0.0']
build-backend = 'poetry.core.masonry.api'
